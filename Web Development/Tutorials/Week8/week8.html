<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        width: 200px;
        padding: 10px;
        margin: auto;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 4px;
      }

      .progress-container {
        width: 100%;
        background-color: #e0e0e0;
        border-radius: 20px;
        margin-bottom: 20px;
        line-height: 25px;
      }

      .progress-bar {
        height: 100%;
        width: 30%;
        background-color: aquamarine;
        text-align: center;
        overflow: hidden;
        font-weight: bold;
        transition: width 0.3s ease;
      }

      input {
        padding: 8px;
        margin: 5px;
      }

      .output {
        margin-top: 15px;
        padding: 10px;
        background-color: aquamarine;
        border-radius: 4px;
        width: 60%;
      }

      button {
        cursor: pointer;
        padding: 8px;
      }

      .step {
        display: none;
        padding: 20px;
        background-color: bisque;
        margin-top: 10px;
        -moz-box-sizing: border-box;
      }

      .step.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="progress-container">
      <div class="progress-bar">Step 1 of 3</div>
    </div>

    <div class="step">
      <p>This is step 1</p>
      <button type="button">Next</button>
    </div>

    <div class="step">
      <p>This is step 2</p>
      <button type="button">Next</button>
    </div>

    <div class="step">
      <p>This is step 3</p>
      <button onclick="combineName()">Show Results</button>
    </div>

    <!-- <div class="output">
      <p id="results">The full name will appear here</p>
    </div> -->

    <div class="output" id="results"></div>

    <script>
      function nextStep(currentStep) {
        document
          .querySelector("#step" + currentStep)
          .classList.remove("active");
        document.querySelector("#step"(currentStep + 1)).classList.add;
      }

      function updateProgress(step) {
        let progressBar = document.querySelector("#progressBar");
        let percentage = (step / 3) * 100;
        progressBar.style.width = percentage + "%";
        progressBar.textContent = "Step " + step + "of 3 ";
      }

      // function combineName() {
      //   let firstName = document.querySelector("#firstName").value;
      //   let lastName = document.querySelector("#lastName").value;

      //   document.querySelector("#results").innerHTML =
      //     `Hello ${firstName} ${lastName}`;
      //
      //}
    </script>
  </body>
</html>
