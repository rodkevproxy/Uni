<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 8</title>
</head>

<body>
    <p>
        <span id="question1">2 + 2 = </span>
        <span id="answer1"></span>
        <span id="feedback1"></span>
    </p>

    <p>
        <span id="question2">4 + 5 = </span>
        <span id="answer2"></span>
        <span id="feedback2"></span>
    </p>

    <p>
        <span id="question3">5 + 5 = </span>
        <span id="answer3"></span>
        <span id="feedback3"></span>
    </p>

    <p><strong>Final Score: </strong><span id="finalScore"></span> / 3</p>

    <script>
        let score = 0;

        // --- Question 1 ---
        let userAnswer1 = prompt("2 + 2 =");
        document.querySelector("#answer1").textContent = userAnswer1;

        if (Number(userAnswer1) === 4) {
            document.querySelector("#feedback1").innerHTML = "&checkmark; Correct!";
            score++;
        } else {
            document.querySelector("#feedback1").innerHTML = "&cross; Incorrect, the correct answer is: 4";
        }

        // --- Question 2 ---
        let userAnswer2 = prompt("4 + 5 =");
        document.querySelector("#answer2").textContent = userAnswer2;

        if (Number(userAnswer2) === 9) {
            document.querySelector("#feedback2").innerHTML = "&checkmark; Correct!";
            score++;
        } else {
            document.querySelector("#feedback2").innerHTML = "&cross; Incorrect, the correct answer is: 9";
        }

        // --- Question 3 ---
        let userAnswer3 = prompt("5 + 5 =");
        document.querySelector("#answer3").textContent = userAnswer3;

        if (Number(userAnswer3) === 10) {
            document.querySelector("#feedback3").innerHTML = "&checkmark; Correct!";
            score++;
        } else {
            document.querySelector("#feedback3").innerHTML = "&cross; Incorrect, the correct answer is: 10";
        }

        // --- Display Final Score ---
        document.querySelector("#finalScore").textContent = score;

    </script>

</body>
